name: Build APKs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Get latest generated apps folder
        id: folder
        run: |
          LATEST=$(ls generated_apps/ | sort -r | head -1)
          echo "date=$LATEST" >> $GITHUB_OUTPUT

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'

      - name: Fix and Build APKs
        run: |
          DATE=${{ steps.folder.outputs.date }}
          mkdir -p apks/$DATE
          for app_dir in generated_apps/$DATE/app_*/; do
            app_name=$(basename $app_dir)
            echo "Building $app_name..."
            PROJECT_NAME=$(echo $app_name | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]/_/g')
            flutter create --project-name $PROJECT_NAME /tmp/$app_name
            sed -i 's/useMaterial3: true,//g' $app_dir/main.dart
            sed -i 's/useMaterial3: true//g' $app_dir/main.dart
            sed -i 's/Icons\.stats/Icons.bar_chart/g' $app_dir/main.dart
            sed -i 's/colorScheme\.accentColor/colorScheme.primary/g' $app_dir/main.dart
            sed -i 's/textTheme\.headline6/textTheme.titleLarge/g' $app_dir/main.dart
            cp $app_dir/main.dart /tmp/$app_name/lib/main.dart
            cd /tmp/$app_name
            flutter build apk --debug || true
            cp build/app/outputs/flutter-apk/app-debug.apk $GITHUB_WORKSPACE/apks/$DATE/${app_name}.apk 2>/dev/null || true
            cd $GITHUB_WORKSPACE
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks-${{ steps.folder.outputs.date }}
          path: apks/
          retention-days: 30
