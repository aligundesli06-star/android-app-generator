name: Generate Android Apps

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Flutter apps
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 generate_apps.py

      - name: Commit generated apps
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add .
          git diff --staged --quiet || git commit -m "Generated apps $(date +%Y-%m-%d)"
          git push
